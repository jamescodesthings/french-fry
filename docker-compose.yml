services:
  serve:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - .:/app
    container_name: french-fry-the-agent
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    command: sh -c "npm install && npm start"
